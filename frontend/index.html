<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AB Nexus '26 — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg0: #0a0c0f;
    --bg1: #111318;
    --bg2: #181c24;
    --bg3: #1e2330;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --amber: #e8a020;
    --amber-dim: rgba(232,160,32,0.15);
    --amber-glow: rgba(232,160,32,0.06);
    --teal: #22c4a0;
    --red: #e85555;
    --green: #5ec67a;
    --text-pri: #e8eaf0;
    --text-sec: #8892aa;
    --text-ter: #505870;
    --mono: 'IBM Plex Mono', monospace;
    --display: 'Syne', sans-serif;
    --body: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg0);
    color: var(--text-pri);
    font-family: var(--body);
    font-size: 13px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 40px 16px;
    overflow-y: auto;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(232,160,32,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,160,32,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* Glow orb */
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(232,160,32,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .login-wrap {
    width: 100%;
    max-width: 400px;
    padding: 24px;
    margin: auto;
    position: relative;
    z-index: 1;
  }

  /* Logo */
  .brand {
    text-align: center;
    margin-bottom: 36px;
  }
  .brand-icon {
    width: 52px;
    height: 52px;
    border-radius: 14px;
    background: var(--amber-dim);
    border: 1px solid rgba(232,160,32,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    font-size: 24px;
  }
  .brand-name {
    font-family: var(--display);
    font-size: 22px;
    font-weight: 800;
    color: var(--amber);
    letter-spacing: 0.02em;
  }
  .brand-name span { color: var(--text-sec); font-weight: 400; font-size: 16px; margin-left: 4px; }
  .brand-sub {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-ter);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* Card */
  .card {
    background: var(--bg1);
    border: 1px solid var(--border2);
    border-radius: 14px;
    padding: 28px;
  }

  /* Form */
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-ter);
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 7px;
    color: var(--text-pri);
    font-family: var(--body);
    font-size: 13px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .field input:focus {
    border-color: rgba(232,160,32,0.4);
    box-shadow: 0 0 0 3px rgba(232,160,32,0.06);
  }
  .field input::placeholder { color: var(--text-ter); }

  .btn-submit {
    width: 100%;
    padding: 11px;
    background: var(--amber-dim);
    border: 1px solid rgba(232,160,32,0.35);
    border-radius: 8px;
    color: var(--amber);
    font-family: var(--display);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 4px;
  }
  .btn-submit:hover:not(:disabled) {
    background: rgba(232,160,32,0.22);
    box-shadow: 0 0 20px rgba(232,160,32,0.12);
  }
  .btn-submit:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .error-box {
    display: none;
    background: rgba(232,85,85,0.1);
    border: 1px solid rgba(232,85,85,0.25);
    border-radius: 7px;
    padding: 10px 12px;
    color: var(--red);
    font-size: 12px;
    margin-top: 14px;
    font-family: var(--mono);
  }

  /* Demo creds */
  .demo-box {
    margin-top: 20px;
    padding: 12px 14px;
    background: var(--amber-glow);
    border: 1px solid rgba(232,160,32,0.12);
    border-radius: 8px;
  }
  .demo-box-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-ter);
    margin-bottom: 8px;
  }
  .demo-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0;
  }
  .demo-key { font-family: var(--mono); font-size: 10px; color: var(--text-ter); }
  .demo-val { font-family: var(--mono); font-size: 10px; color: var(--amber); }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 20px;
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-ter);
    letter-spacing: 0.06em;
  }

  /* Status dots */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-top: 10px;
  }
  .s-item { display: flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 9px; color: var(--text-ter); }
  .s-dot { width: 5px; height: 5px; border-radius: 50%; }
  .s-dot.green { background: var(--green); box-shadow: 0 0 4px var(--green); animation: blink 2s ease-in-out infinite; }
  .s-dot.amber { background: var(--amber); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.5} }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="brand">
    <div class="brand-icon">⛯</div>
    <div class="brand-name">AB <span>Nexus</span></div>
    <div class="brand-sub">Enterprise Command Center · 2026</div>
  </div>

  <div class="card">
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="surveyor@mclarens.com" autocomplete="email" autofocus>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-submit" id="loginBtn" onclick="doLogin()">SIGN IN →</button>
    <div class="error-box" id="errorBox"></div>
  </div>

  <div class="demo-box">
    <div class="demo-box-label">Demo Credentials</div>
    <div class="demo-row">
      <span class="demo-key">Email</span>
      <span class="demo-val"><a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="80e1e4ede9eec0ede3ece1f2e5eef3aee3efed">[email&#160;protected]</a></span>
    </div>
    <div class="demo-row">
      <span class="demo-key">Password</span>
      <span class="demo-val">Admin@123</span>
    </div>
  </div>

  <div class="footer">
    <div class="status-bar">
      <div class="s-item"><div class="s-dot green"></div>API ONLINE</div>
      <div class="s-item"><div class="s-dot amber"></div>CF WORKERS</div>
      <div class="s-item">MCL-PUN-26</div>
    </div>
  </div>
</div>

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
  const API_URL = 'https://ab-nexus-api.amitbhavikmnm.workers.dev';

  // SW cleanup disabled — blanket unregister was triggering controllerchange
  // in the dashboard, causing an infinite reload loop on Cloudflare Pages (HTTPS).
  // Individual SW updates are handled gracefully by the dashboard itself.

  // Already logged in → skip to app
  (function() {
    if (localStorage.getItem('nexus_token')) {
      window.location.replace('/surveyor-dashboard.html');
    }
  })();

  // Enter key support
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    var email    = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;
    var btn      = document.getElementById('loginBtn');
    var errBox   = document.getElementById('errorBox');

    errBox.style.display = 'none';

    if (!email || !password) {
      showError('Email and password are required.');
      return;
    }

    btn.disabled    = true;
    btn.textContent = 'AUTHENTICATING…';

    try {
      var res  = await fetch(API_URL + '/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email, password: password })
      });
      var data = await res.json();

      if (data.success) {
        localStorage.setItem('nexus_token', data.token);
        localStorage.setItem('nexus_user',  JSON.stringify(data.user));
        // Route by role
        var role = data.user && data.user.role;
        if (role === 'hr_admin' || role === 'employee') {
          window.location.href = '/hrms-dashboard.html';
        } else {
          window.location.href = '/surveyor-dashboard.html';
        }
      } else {
        showError(data.error || 'Invalid credentials. Please try again.');
        btn.disabled    = false;
        btn.textContent = 'SIGN IN →';
      }
    } catch (err) {
      showError('Connection failed. Check your network and try again.');
      btn.disabled    = false;
