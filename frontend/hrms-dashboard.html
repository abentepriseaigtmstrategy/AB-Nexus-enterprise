    // ─── INIT ─────────────────────────────────────────────────────────────────
    init() {
        this.switchModule('dashboard');
        document.getElementById('toggleSidebar').onclick = () => document.getElementById('sidebar').classList.toggle('-translate-x-full');
        document.getElementById('globalSearch').oninput = (e) => {
            this.state.filters.search = e.target.value.toLowerCase();
            this.renderContent();
        };
        this.updateClockIndicator();
        
        // Wait for Lucide to be available
        const initIcons = () => {
            if (typeof lucide !== 'undefined' && lucide.createIcons) {
                lucide.createIcons();
            } else {
                setTimeout(initIcons, 100);
            }
        };
        initIcons();
    },

    updateClockIndicator() {
        const el = document.getElementById('clock-indicator');
        if (el) el.className = `absolute top-2 right-2 w-2 h-2 rounded-full ${this.state.clockedIn ? 'bg-green-400' : 'bg-red-500'}`;
    },

    switchModule(modId, ctx) {
        this.state.currentModule = modId;
        if (ctx) this.state.ctx = ctx;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('nav-item-active', el.dataset.mod === modId));
        const labels = { dashboard:'Insights', ess:'Self Service', eis:'Employee Info', lifecycle:'Lifecycle', attendance:'Attendance', leave:'Leave', tasks:'Tasks', recruitment:'Recruitment', performance:'Performance', grievance:'Grievance', payroll:'Payroll', expense:'Expenses', loans:'Loans', claims:'Claims', documents:'Documents', assignments:'Assignments', invoices:'Invoicing' };
        document.getElementById('breadcrumb').innerText = labels[modId] || modId;
        this.renderContent();
        if (window.innerWidth < 1024) document.getElementById('sidebar').classList.add('-translate-x-full');
    },

    renderContent() {
        const container = document.getElementById('moduleContent');
        container.innerHTML = '';
        container.classList.remove('module-fade-in');
        void container.offsetWidth;
        container.classList.add('module-fade-in');

        const renders = {
            dashboard: () => this.ui_dashboard(container),
            ess: () => this.ui_ess(container),
            eis: () => this.ui_eis(container),
            lifecycle: () => this.ui_lifecycle(container),
            attendance: () => this.ui_attendance(container),
            leave: () => this.ui_leave(container),
            tasks: () => this.ui_tasks(container),
            recruitment: () => this.ui_recruitment(container),
            performance: () => this.ui_performance(container),
            grievance: () => this.ui_grievance(container),
            payroll: () => this.ui_payroll(container),
            expense: () => this.ui_expense(container),
            loans: () => this.ui_loans(container),
            claims: () => this.ui_claims(container),
            documents: () => this.ui_documents(container),
            assignments: () => this.ui_tableView(container, 'assignments'),
            invoices: () => this.ui_tableView(container, 'invoices')
        };
        (renders[this.state.currentModule] || (() => this.ui_placeholder(container, this.state.currentModule)))();
        
        if (typeof lucide !== 'undefined' && lucide.createIcons) {
            lucide.createIcons();
        }
    },

    // ─── STAT CARD ────────────────────────────────────────────────────────────
    stat(title, value, icon, color, link) {
        const click = link ? `onclick="NexusApp.switchModule('${link}')" style="cursor:pointer"` : '';
        return `<div class="glass p-6 rounded-[1.5rem] border-white/5 hover:border-brand-500/20 transition-all group shadow-xl" ${click}>
            <div class="flex justify-between items-start mb-4">
                <div class="p-2 rounded-xl bg-white/5"><i data-lucide="${icon}" class="w-4 h-4 ${color}"></i></div>
                ${link ? `<i data-lucide="arrow-up-right" class="w-3 h-3 text-gray-700 group-hover:text-brand-400 transition-colors"></i>` : ''}

            <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">${title}</p>
            <h4 class="text-2xl font-black tracking-tighter text-white">${value}</h4>
        </div>`;
    },

    badge(status) {
        const map = {
            'Active':'text-green-400','Present':'text-green-400','Approved':'text-green-400','Paid':'text-green-400','Verified':'text-green-400','Closed':'text-gray-500','Completed':'text-gray-500','Rejected':'text-red-400','Critical':'text-red-400','Absent':'text-red-400','Open':'text-red-400',
            'Pending':'text-yellow-400','Probation':'text-yellow-400','Pending Verification':'text-yellow-400','In Review':'text-yellow-400','In Progress':'text-brand-400','Leave':'text-blue-400','Processing':'text-brand-400','Draft':'text-brand-400','Todo':'text-gray-500','Done':'text-green-400','Review':'text-yellow-400','Outstanding':'text-emerald-400','Exceeds Expectations':'text-teal-400','Meets Expectations':'text-blue-400','Needs Improvement':'text-orange-400'
        };
        const c = map[status] || 'text-gray-400';
        return `<span class="status-pill ${c}">${status}</span>`;
    },

    sectionHeader(title, subtitle, btnLabel, btnAction) {
        return `<div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">

    toggleClock() {
        this.state.clockedIn = !this.state.clockedIn;
        if (this.state.clockedIn) {
            this.state.clockInTime = new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
            this.state.clockInTs = Date.now();
            this.notify('Clocked In successfully!', 'success');
        } else {
            this.notify('Clocked Out. Have a great day!', 'success');
        }
        this.updateClockIndicator();
        this.renderContent();
    },

    startLiveClock() {
        const el = document.getElementById('live-clock');
        if (!el) return;
        const tick = () => { if(el) el.textContent = new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true}); };
        tick();
        this._clockInt = setInterval(tick, 1000);
    },

    startElapsed() {
        const el = document.getElementById('elapsed');
        if (!el || !this.state.clockInTs) return;
        const tick = () => {
            if (!el) return;
            const secs = Math.floor((Date.now() - this.state.clockInTs)/1000);
            const h = Math.floor(secs/3600), m = Math.floor((secs%3600)/60), s = secs%60;
            el.textContent = `${String(h).padStart(2,'0')}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
        };
        tick();
        setInterval(tick, 1000);
    },

    downloadDocument(docId) {

        const htmlContent = `<!DOCTYPE html>
<html>
<head>

    <title>${doc.filename}</title>
    <style>

            background: #f8f9fa;
            padding: 25px 30px;
            border-bottom: 1px solid #e0e0e0;
        }

            font-weight: bold;

            background: #10b98120;
            color: #10b981;
        }
        .status-pending {
            background: #f59e0b20;
            color: #f59e0b;
        }
    </style>
</head>
<body>
    <div class="document-container">
        <div class="header">
            <div class="company-name">MCLARENS NEXUS ENTERPRISE '26</div>
            <div class="doc-title">OFFICIAL DOCUMENT</div>
        </div>
        
        <div class="doc-details">
            <div class="details-item"><span class="label">Document ID:</span><span>${doc.id}</span></div>
            <div class="details-item"><span class="label">Document Type:</span><span>${doc.type}</span></div>
            <div class="details-item"><span class="label">Employee:</span><span>${doc.emp}</span></div>
            <div class="details-item"><span class="label">Filename:</span><span>${doc.filename}</span></div>
            <div class="details-item"><span class="label">Uploaded On:</span><span>${doc.uploadedOn}</span></div>
            <div class="details-item"><span class="label">File Size:</span><span>${doc.size}</span></div>
            <div class="details-item"><span class="label">Status:</span><span><span class="status-badge ${doc.status === 'Verified' ? 'status-verified' : 'status-pending'}">${doc.status}</span></span></div>
            ${doc.expiry ? `<div class="details-item"><span class="label">Expiry Date:</span><span>${doc.expiry}</span></div>` : ''}
        </div>
        
        <div class="doc-content">
            <h3 style="color: #8b5cf6; margin-bottom: 15px;">Document Information</h3>
            <p>This document (${doc.filename}) is an official record maintained by Mclarens Nexus Enterprise HRMS.</p>
            <p style="margin-top: 15px;">Document Type: ${doc.type}</p>
            <p>Employee: ${doc.emp}</p>
            <p>Verification Status: ${doc.status}</p>
            <p style="margin-top: 20px;">This is a system-generated copy of the original document stored in the HRMS repository.</p>
            <p style="margin-top: 15px;">For any discrepancies, please contact the HR department immediately.</p>
        </div>
        
        <div class="footer">
            <p>This is an official document from Mclarens Nexus Enterprise HRMS.</p>
            <p>Generated on: ${new Date().toLocaleString('en-IN')}</p>
        </div>
    </div>
</body>
</html>`;
        
        const blob = new Blob([htmlContent], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = doc.filename.replace('.pdf', '.html');
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        this.notify(`Document ${doc.filename} downloaded! Open in any browser.`, 'success');

    confirmEmployee(empId) {
        const lc = this.db.lifecycle.find(l=>l.empId===empId);

        if(lc) { lc.confirmed=true; lc.stage='Active'; lc.events.push('Confirmed & Regularized'); }
        if(emp) emp.status='Active';
        this.notify(`${emp?emp.name:'Employee'} confirmed and regularized!`, 'success');
        this.renderContent();

                </div>`).join('')}
            </div>`, '<button onclick="NexusApp.closeModal()" class="w-full bg-dark-700 text-gray-300 font-black uppercase tracking-widest text-xs py-4 rounded-2xl border border-white/5">Dismiss All</button>');
    },

    openDetail(type, id) {
        this.openModal(`Record: ${id}`, `
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="p-4 rounded-2xl bg-white/5 border border-white/5"><p class="text-[10px] text-gray-500 uppercase mb-1">Status</p><p class="text-sm font-bold text-brand-400 flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-brand-500 animate-pulse"></span>Synchronized</p></div>
                <div class="p-4 rounded-2xl bg-white/5 border border-white/5"><p class="text-[10px] text-gray-500 uppercase mb-1">Timestamp</p><p class="text-sm font-bold text-white">${new Date().toLocaleString('en-IN')}</p></div>
            </div>`);
    },

    openWizard(mod) { this.notify(`Initializing wizard for ${mod}...`,'info'); },
    closeModal() { document.getElementById('modalOverlay').style.display = 'none'; },

    notify(msg, type='success') {
        const container = document.getElementById('toast-container');
        const t = document.createElement('div');
        const colors = type==='success'?'border-green-500/50 text-green-400 bg-green-500/10':type==='info'?'border-brand-500/50 text-brand-400 bg-brand-500/10':'border-red-500/50 text-red-400 bg-red-500/10';
        t.className = `p-4 rounded-2xl glass border ${colors} shadow-2xl flex items-center gap-3 module-fade-in pointer-events-auto`;
        t.innerHTML = `<i data-lucide="${type==='success'?'check-circle':'info'}" class="w-4 h-4 shrink-0"></i><span class="text-xs font-bold">${msg}</span>`;
        container.appendChild(t);
        if (typeof lucide !== 'undefined' && lucide.createIcons) {
            lucide.createIcons();
        }
        setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(20px)';t.style.transition='all 0.3s';setTimeout(()=>t.remove(),300);},3500);
    }
};

// ===== AUTH GUARD =====
(function() {
  var token = localStorage.getItem('nexus_token');
  if (!token) { window.location.replace('index.html'); return; }
  try {
    var u = JSON.parse(localStorage.getItem('nexus_user'));
    if (u && u.name) {
      var parts    = u.name.trim().split(' ');
      var initials = parts.length >= 2 ? parts[0][0] + parts[1][0] : parts[0].substring(0,2);
      initials = initials.toUpperCase();
      // update topbar avatar
      var btn = document.getElementById('userAvatarBtn');
      if (btn) btn.textContent = initials;
      // update sidebar avatar
      var sideEl = document.querySelector('.w-10.h-10.rounded-xl.bg-gradient-to-br');
      if (sideEl) sideEl.textContent = initials;
      var nameEl = document.querySelector('.text-xs.font-bold.truncate.text-white');
      if (nameEl) nameEl.textContent = u.name;
      var roleEl = document.querySelector('.text-\\[10px\\].text-gray-500.truncate');
      if (roleEl && u.role) roleEl.textContent = u.role.replace(/_/g,' ').replace(/\b\w/g,function(c){return c.toUpperCase();});
    }
  } catch(e) {}
})();

function doLogout() {
  if (!confirm('Sign out of McLarens Nexus?')) return;
  var token = localStorage.getItem('nexus_token');
  if (token) {
    fetch('https://mclarens-nexus-api.amitbhavikmnm.workers.dev/api/auth/logout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }
    }).catch(function(){});
  }
  localStorage.removeItem('nexus_token');
  localStorage.removeItem('nexus_user');
  window.location.href = 'index.html';
}

window.onload = () => NexusApp.init();
</script>
